<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>又菜又爱玩 · 羽毛球爱好者群</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="public/imgs/svgs/shuttles.svg" />

  <!-- Inter + Noto Sans SC -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap"
    rel="stylesheet"
  />

  <!-- React 18 + Babel + Framer Motion 11 + Tailwind CDN -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
  <script>window.Motion = window.FramerMotion;</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            court:    '#16a34a',
            shuttle:  '#fbbf24',
            energy:   '#f97316',
            sky2:     '#38bdf8',
            cream:    '#fefce8',
          },
          fontFamily: {
            sans: ['Inter', '"Noto Sans SC"', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <style>
    html { scroll-behavior: smooth; }
    html, body {
      font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #fffaf0;
      color: #0f172a;
    }
    body { overflow-x: hidden; }

    /* Court lines decoration */
    .court-bg {
      background-image:
        linear-gradient(to right, rgba(22,163,74,0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(22,163,74,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Subtle float animation for decorative elements */
    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }
    .floaty { animation: floaty 5s ease-in-out infinite; }
    .floaty-2 { animation: floaty 6s ease-in-out infinite 0.5s; }
    .floaty-3 { animation: floaty 4s ease-in-out infinite 1s; }

    /* Shuttlecock arc keyframes (used with CSS-only fallback if motion fails) */
    @keyframes shuttle-arc {
      0%   { transform: translate(-10vw, 30vh) rotate(-30deg); }
      25%  { transform: translate(20vw, 5vh)  rotate(80deg); }
      50%  { transform: translate(50vw, 0)    rotate(220deg); }
      75%  { transform: translate(80vw, 10vh) rotate(340deg); }
      100% { transform: translate(110vw, 30vh) rotate(420deg); }
    }

    /* Counter rise */
    @keyframes counter-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Photo card hover */
    .photo-card { transition: transform 500ms cubic-bezier(.22,1,.36,1), box-shadow 500ms; }
    .photo-card:hover { transform: scale(1.03); box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
    .photo-card img { transition: transform 700ms cubic-bezier(.22,1,.36,1); }
    .photo-card:hover img { transform: scale(1.08); }

    .bounce-in { animation: bounce-in 0.8s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes bounce-in {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useRef, useEffect } = React;
    const FM = window.FramerMotion || window.Motion;

    /* === motion with Proxy fallback (so page renders even if FM CDN fails) === */
    function makePlain(tag) {
      const T = String(tag);
      const C = ({ children, className, style, initial, animate, whileInView, transition, variants, exit, viewport, ...rest }) =>
        React.createElement(T, { className, style, ...rest }, children);
      C.displayName = `motion(${T})`;
      return C;
    }
    const motion = (FM && FM.motion)
      ? FM.motion
      : new Proxy({}, { get: (_, tag) => makePlain(tag) });

    const EASE = [0.22, 1, 0.36, 1];

    /* ============================================================
       Inline lucide-style icons
       ============================================================ */
    const Icon = {
      ArrowRight: ({c='w-4 h-4'}) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={c}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      ),
      MapPin: ({c='w-4 h-4'}) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={c}><path d="M20 10c0 7-8 13-8 13s-8-6-8-13a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>
      ),
      Clock: ({c='w-4 h-4'}) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={c}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      ),
      Users: ({c='w-4 h-4'}) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={c}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      ),
      Trophy: ({c='w-4 h-4'}) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={c}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
      ),
      Sparkles: ({c='w-4 h-4'}) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={c}>
          <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
          <path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/>
        </svg>
      ),
      Heart: ({c='w-4 h-4'}) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={c}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
      ),
      Shield: ({c='w-4 h-4'}) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={c}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      ),
      Star: ({c='w-4 h-4'}) => (
        <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={c}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>

      ChevronDown: ({c='w-4 h-4'}) => (

      Check: ({c='w-4 h-4'}) => (

      Camera: ({c='w-4 h-4'}) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={c}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>

    };

    /* ============================================================
       Shuttlecock SVG (with simple racket)
       ============================================================ */
    function Shuttlecock({ className = 'w-16 h-16' }) {
      return (
        <svg viewBox="0 0 64 64" className={className}>
          <defs>
            <linearGradient id="shuttle-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stopColor="#fef3c7" />
              <stop offset="100%" stopColor="#fbbf24" />
            </linearGradient>
          </defs>

          <circle cx="32" cy="40" r="9" fill="url(#shuttle-grad)" stroke="#d97706" strokeWidth="1" />
          {/* Feathers */}
          <g stroke="#fff" strokeWidth="1.5" fill="none" opacity="0.95">
            <path d="M24 36 Q14 24 16 8" />
            <path d="M32 32 L32 6"  />
            <path d="M40 36 Q50 24 48 8" />
            <path d="M22 38 Q8 32 6 22" />
            <path d="M42 38 Q56 32 58 22" />
          </g>
        </svg>
      );
    }

    function Racket({ className = 'w-20 h-20', flip = false }) {

        <svg viewBox="0 0 80 120" className={className} style={{ transform: flip ? 'scaleX(-1)' : 'none' }}>
          <defs>
            <linearGradient id="racket-grad" x1="0" y1="0" x2="0" y2="1">

          {/* Shaft */}
          <rect x="37" y="40" width="6" height="78" rx="3" fill="#1e293b" />
          {/* Head */}
          <ellipse cx="40" cy="28" rx="32" ry="36" fill="none" stroke="url(#racket-grad)" strokeWidth="4" />

          <g stroke="#e2e8f0" strokeWidth="0.6" opacity="0.7">
            <line x1="14" y1="14" x2="66" y2="14" />
            <line x1="10" y1="22" x2="70" y2="22" />
            <line x1="10" y1="34" x2="70" y2="34" />
            <line x1="14" y1="42" x2="66" y2="42" />
            <line x1="22" y1="6"  x2="22" y2="50" />
            <line x1="32" y1="2"  x2="32" y2="54" />
            <line x1="40" y1="-2" x2="40" y2="58" />
            <line x1="48" y1="2"  x2="48" y2="54" />
            <line x1="58" y1="6"  x2="58" y2="50" />

    /* ============================================================
       Player — full body silhouette swinging a racket
       Pivot points (viewBox coords):
         Back-arm shoulder:  (95, 105)
         Front-arm shoulder: (145, 105)
       Swing loop: 1.8s, 4 stages
         0%   backswing  (racket up-back)
         30%  transition (racket passes neutral)
         50%  contact    (racket forward-down, shuttlecock hit)
         70%  follow-thru / settle

       ============================================================ */

        <svg viewBox="0 0 260 380" className={className}>
          <defs>
            <linearGradient id="jersey-grad" x1="0" y1="0" x2="0" y2="1">

              <stop offset="100%" stopColor="#15803d" />
            </linearGradient>

              <stop offset="0%" stopColor="#0ea5e9" />
              <stop offset="100%" stopColor="#0c4a6e" />
            </linearGradient>
          </defs>

          {/* Court line + shadow */}
          <line x1="0" y1="365" x2="260" y2="365" stroke="#16a34a" strokeWidth="2" opacity="0.35" />
          <ellipse cx="130" cy="365" rx="70" ry="6" fill="#000" opacity="0.12" />

          <path d="M145 235 L158 360 L138 360 L132 240 Z" fill="#1e293b" />

          {/* Shoes */}
          <ellipse cx="112" cy="362" rx="16" ry="5" fill="#0f172a" />
          <ellipse cx="148" cy="362" rx="16" ry="5" fill="#0f172a" />
          <ellipse cx="112" cy="360" rx="16" ry="3" fill="#334155" />
          <ellipse cx="148" cy="360" rx="16" ry="3" fill="#334155" />

          <text x="130" y="215" fontSize="28" fontWeight="900" fill="white" textAnchor="middle" opacity="0.9">88</text>

          {/* Neck */}
          <rect x="122" y="82" width="16" height="22" fill="#fbbf24" />

          {/* Head */}
          <circle cx="130" cy="58" r="29" fill="#fbbf24" />
          {/* Hair */}

          <circle cx="148" cy="61" r="0.8" fill="white" />
          {/* Eyebrow */}
          <path d="M142 53 L153 53" stroke="#1e293b" strokeWidth="2" strokeLinecap="round" />
          {/* Mouth */}
          <path d="M144 75 Q150 78 154 75" stroke="#1e293b" strokeWidth="2" fill="none" strokeLinecap="round" />
          {/* Sweat drop */}
          <motion.path

          {/* === BACK ARM (counter-balance, swings opposite) === */}
          <motion.g
            style={{ transformOrigin: '100px 110px', transformBox: 'view-box' }}
            animate={{ rotate: [20, 0, -35, -10, 20] }}
            transition={{ duration: 1.8, repeat: Infinity, ease: 'easeInOut', times: [0, 0.3, 0.5, 0.7, 1] }}
          >
            <path d="M100 110 L65 140" stroke="#fbbf24" strokeWidth="13" strokeLinecap="round" />
            <path d="M65 140 L48 178" stroke="#fbbf24" strokeWidth="11" strokeLinecap="round" />
            <circle cx="48" cy="180" r="8" fill="#fbbf24" />
          </motion.g>

          {/* === MOTION LINES (visible only during fast swing segment) === */}
          <motion.g
            stroke="#fbbf24"
            strokeWidth="3"
            strokeLinecap="round"
            fill="none"
            animate={{ opacity: [0, 0, 0.8, 0.4, 0] }}
            transition={{ duration: 1.8, repeat: Infinity, times: [0, 0.3, 0.5, 0.65, 0.8] }}
          >
            <path d="M205 115 Q225 100 240 78"  />
            <path d="M198 140 Q222 130 238 115" />
            <path d="M192 165 Q215 160 228 155" />
          </motion.g>

          {/* === FRONT ARM + RACKET (the swinging arm) === */}
          <motion.g
            style={{ transformOrigin: '155px 110px', transformBox: 'view-box' }}
            animate={{ rotate: [-60, 5, 80, 50, -60] }}
            transition={{ duration: 1.8, repeat: Infinity, ease: 'easeInOut', times: [0, 0.3, 0.5, 0.7, 1] }}
          >
            {/* Upper arm */}
            <path d="M155 110 L182 142" stroke="#fbbf24" strokeWidth="13" strokeLinecap="round" />
            {/* Forearm */}
            <path d="M182 142 L205 175" stroke="#fbbf24" strokeWidth="11" strokeLinecap="round" />
            {/* Wrist + handle */}
            <rect x="202" y="173" width="8" height="42" rx="3" fill="#1e293b" />
            <rect x="202" y="173" width="8" height="42" rx="3" fill="none" stroke="#fbbf24" strokeWidth="0.8" />
            {/* Hand grip */}
            <circle cx="206" cy="178" r="7" fill="#fbbf24" />
            {/* Racket head (group offset so rotation pivots at handle base) */}
            <g transform="translate(206 140)">
              <ellipse cx="0" cy="0" rx="32" ry="36" fill="rgba(14,165,233,0.08)" />
              <ellipse cx="0" cy="0" rx="32" ry="36" fill="none" stroke="url(#racket-grad2)" strokeWidth="5" />
              <g stroke="#fff" strokeWidth="1" opacity="0.65">
                <line x1="-26" y1="-22" x2="26" y2="-22" />
                <line x1="-29" y1="-11" x2="29" y2="-11" />
                <line x1="-30" y1="0"   x2="30" y2="0" />
                <line x1="-29" y1="11"  x2="29" y2="11" />
                <line x1="-26" y1="22"  x2="26" y2="22" />
                <line x1="-15" y1="-32" x2="-15" y2="32" />
                <line x1="0"   y1="-36" x2="0"   y2="36" />
                <line x1="15"  y1="-32" x2="15"  y2="32" />
              </g>
              <circle cx="0" cy="0" r="4" fill="#fbbf24" />
              <text x="0" y="3" fontSize="5" fontWeight="900" fill="#0c4a6e" textAnchor="middle">Y</text>
            </g>
          </motion.g>

          {/* === SHUTTLECOCK (appears at contact, flies off) === */}
          <motion.g
            animate={{
              x: [0, 0, 0, 90, 240],
              y: [0, 0, 0, -45, -115],
              rotate: [0, 0, 0, 220, 600],
              opacity: [0, 0, 1, 1, 0],
            }}
            transition={{ duration: 1.8, repeat: Infinity, ease: 'easeOut', times: [0, 0.45, 0.5, 0.75, 1] }}
          >
            {/* Cork head */}
            <circle cx="135" cy="148" r="8" fill="#fef3c7" stroke="#d97706" strokeWidth="1.2" />
            {/* Feathers */}
            <g stroke="#fff" strokeWidth="1.4" strokeLinecap="round" fill="none">
              <line x1="129" y1="142" x2="121" y2="125" />
              <line x1="135" y1="140" x2="135" y2="122" />
              <line x1="141" y1="142" x2="149" y2="125" />
              <line x1="127" y1="146" x2="116" y2="138" />
              <line x1="143" y1="146" x2="154" y2="138" />
            </g>
          </motion.g>
        </svg>
      );
    }

    /* ============================================================
       Court net (decorative SVG)
       ============================================================ */
    function CourtNet({ className }) {
      return (
        <svg viewBox="0 0 400 80" className={className} preserveAspectRatio="none">
          {/* Net top tape */}
          <rect x="0" y="6" width="400" height="6" fill="#fff" />
          {/* Net mesh (simple diagonal lines) */}
          <g stroke="#cbd5e1" strokeWidth="0.8" opacity="0.55">
            {Array.from({ length: 50 }).map((_, i) => (
              <line key={i} x1={i * 8} y1="12" x2={i * 8 + 40} y2="74" />
            ))}
          </g>
          {/* Posts */}
          <rect x="0"   y="0" width="4" height="80" fill="#475569" />
          <rect x="396" y="0" width="4" height="80" fill="#475569" />
        </svg>
      );
    }

    /* ============================================================
       Helpers
       ============================================================ */
    const fadeUp = (delay = 0, opts = {}) => ({
      initial: { opacity: 0, y: opts.y ?? 24 },
      whileInView: { opacity: 1, y: 0 },
      viewport: { once: true, amount: opts.amount ?? 0.2 },
      transition: { duration: opts.duration ?? 0.7, ease: EASE, delay },
    });

    function Counter({ from = 0, to, duration = 1.6, suffix = '', prefix = '' }) {
      const [val, setVal] = useState(from);
      const ref = useRef(null);
      const inView = (FM && FM.useInView)
        ? FM.useInView(ref, { once: true, amount: 0.5 })
        : [ref, true];
      const [el] = inView;
      useEffect(() => {
        if (!el || !el.current) return;
        let raf, start;
        const step = (ts) => {
          if (!start) start = ts;
          const t = Math.min((ts - start) / (duration * 1000), 1);
          const eased = 1 - Math.pow(1 - t, 3);
          setVal(Math.round(from + (to - from) * eased));
          if (t < 1) raf = requestAnimationFrame(step);
        };
        raf = requestAnimationFrame(step);
        return () => cancelAnimationFrame(raf);
      }, [el, to, from, duration]);
      return <span ref={el}>{prefix}{val}{suffix}</span>;
    }

    /* ============================================================
       Navbar
       ============================================================ */
    function Navbar() {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 30);
        window.addEventListener('scroll', onScroll);
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      const links = [
        ['#rules', '群规'],
        ['#schedule', '活动'],
        ['#vibe', '群氛围'],
        ['#levels', '等级'],
        ['#join', '加入'],
      ];
      return (
        <motion.nav

                      <span className="text-xs text-slate-500">占比 {Math.round(l.count / total * 100)}%</span>
                    </div>
                    <h3 className={`text-2xl font-black bg-gradient-to-r ${l.color} bg-clip-text text-transparent tracking-tight`}>{l.tag}</h3>
                    <p className="mt-2 text-sm text-slate-600 leading-relaxed">{l.desc}</p>
                    <div className="mt-4 pt-4 border-t border-slate-100">
                      <div className="text-xs uppercase tracking-widest text-slate-500 font-semibold mb-2">典型技能</div>
                      <div className="flex flex-wrap gap-1.5">
                        {l.skills.map((s) => (
                          <span key={s} className="text-xs bg-slate-100 text-slate-700 rounded-full px-2.5 py-1">{s}</span>
                        ))}
                      </div>
                    </div>
                    {/* Distribution bar */}
                    <div className="mt-4 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                      <motion.div
                        initial={{ width: 0 }}
                        whileInView={{ width: `${(l.count / total) * 100}%` }}
                        viewport={{ once: true }}
                        transition={{ duration: 1.2, ease: EASE, delay: 0.3 + i * 0.1 }}
                        className={`h-full bg-gradient-to-r ${l.color}`}
                      />
                    </div>
                  </div>
                </motion.div>
              ))}
            </div>
          </div>
        </section>
      );
    }
